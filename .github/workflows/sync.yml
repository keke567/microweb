name: Sync Fork with Upstream 

on:
  schedule:
    - cron: '0 7 * * *'   # 每天 UTC 7 点（北京时间 15 点）运行
  workflow_dispatch:      # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master  # 你的仓库主分支是 master

      - name: Sync with upstream
        run: |
          # 添加上游仓库（如果已存在则忽略错误）
          git remote add upstream https://github.com/MyslZhao/microweb.git || true
          # 拉取上游最新代码
          git fetch upstream
          # 优先尝试合并，若失败则强制重置为上游 master（兼容无共同历史场景）
          git merge upstream/master --no-edit || git reset --hard upstream/master
